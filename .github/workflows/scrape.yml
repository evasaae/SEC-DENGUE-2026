name: Scrape Berita DBD

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:
  push:
    branches:
      - feature/news-scraper
      - main

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install feedparser pandas
      
      - name: Run scraper
        run: python web-scrapping/scrap.py
      
      - name: Commit dan push CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/berita_dbd.csv data/detail_berita.csv data/last_updated.txt
          git commit -m "Update berita DBD $(date '+%Y-%m-%d')" || echo "No changes"
          git push