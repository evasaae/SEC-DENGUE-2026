name: Scrape Berita DBD

on:
  schedule:
    - cron: '0 17 * * *' # Berjalan otomatis setiap hari jam 00:00 WIB (17:00 UTC)
  workflow_dispatch:     # Memungkinkan tombol manual "Run workflow" di web GitHub
  push:
    branches:
      - feature/news-scraper
      - main

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Menginstal pustaka dasar, transformer NLP, dan backend AI (Torch CPU agar hemat memori)
          pip install feedparser pandas transformers torch --extra-index-url https://download.pytorch.org/whl/cpu --no-cache-dir
          
      - name: Run scraper
        run: python web-scrapping/scrap.py
      
      - name: Commit dan push CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/berita_dbd.csv data/detail_berita.csv data/last_updated.txt
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update berita DBD $(date '+%Y-%m-%d')"
          git push