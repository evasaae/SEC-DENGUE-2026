name: Update Data Cuaca Kalbar Harian

on:
  schedule:
    - cron: '47 15 * * *' 
  workflow_dispatch: 

#permissions:
# contents: write (jika workflow permissionsnya read only)

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repositori
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas openpyxl

    - name: Run Data Script
      run: |
        cd "Data Cuaca Harian Kalbar"
        python cuaca_harian_kalbar.py

    - name: Commit dan Push Perubahan Data
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action Bot"
        
        git add "Data Cuaca Harian Kalbar/"
        
        if ! git diff --cached --quiet; then
          git commit -m "Update Data Cuaca Harian: $(date +'%Y-%m-%d %H:%M:%S')"
          git pull origin main --rebase
          git push origin HEAD:main
        else
          echo "Tidak ada perubahan data cuaca harian terbaru untuk di-commit hari ini."
        fi
